[build]
  command = "npm run build"
  publish = "dist"

# index.html e raiz: nunca cachear
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# Service Worker: nunca cachear
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# Assets com hash no nome: cache longo (conteúdo nunca muda com mesmo hash)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Fontes e ícones estáticos
[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# SPA fallback — todas as rotas servem index.html sem cache
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  headers = {Cache-Control = "no-cache, no-store, must-revalidate"}
